name: Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        uses: sxzz/workflows/setup-js@main
        with:
          persist-credentials: true

      - name: Fetch dependents
        run: node index.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Generate README
        run: node markdown.ts

      - name: Generate circles
        run: node circles.ts

      - name: Commit and push
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: data README.md circles.svg
          default_author: github_actions
          message: 'chore: update data'
